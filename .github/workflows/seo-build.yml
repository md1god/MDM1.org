name: Automated SEO and Site Builder

on:
  schedule:
    - cron: '0 * * * *' # يتم التشغيل تلقائياً كل ساعة
  workflow_dispatch: # يتيح التشغيل اليدوي من تبويب Actions في جيت هب

jobs:
  build-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies (if package.json exists)
        run: |
          if [ -f "package.json" ]; then
            npm install
          fi

      - name: Run Build and SEO Script
        run: |
          if [ -f "scripts/build.js" ]; then
            node scripts/build.js
          elif [ -f "build.js" ]; then
            node build.js
          else
            echo "No build script found, skipping execution."
          fi

      - name: Commit and Push Generated Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated hourly SEO and pages build"
          branch: main
          file_pattern: "*.html pages/*.html sitemap.xml css/*.css js/*.js"
