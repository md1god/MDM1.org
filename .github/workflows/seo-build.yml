name: Automated SEO and Page Builder

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # استبدل './اسم-المجلد' بالمجلد الذي يحتوي على package.json
      - name: Install Dependencies
        run: npm install
        working-directory: ./اسم-المجلد 

      - name: Run Build Script
        run: node scripts/build.js
        working-directory: ./اسم-المجلد

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated build and SEO update"
          branch: main
          file_pattern: "*.html sitemap.xml data/*.json"
