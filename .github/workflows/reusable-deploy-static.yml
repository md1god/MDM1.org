name: Reusable Deploy Static
on:
  workflow_call:
    inputs:
      site-dir: { type: string, default: '.' }
  workflow_dispatch:
    inputs:
      site-dir: { type: string, default: '.', description: "المجلد الذي يحتوي على ملفات الموقع" }

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: '${{ inputs.site-dir }}' }
      - id: deployment
        uses: actions/deploy-pages@v4
