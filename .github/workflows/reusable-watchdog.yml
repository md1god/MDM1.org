name: Reusable Watchdog
on:
  workflow_call:
    inputs:
      build-workflow-file: { type: string, default: 'build.yml' }
  workflow_dispatch:
    inputs:
      build-workflow-file: { type: string, default: 'build.yml', description: "اسم ملف الـ Workflow المراد مراقبته" }

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: '${{ inputs.build-workflow-file }}', per_page: 1
            });
            const last = runs.workflow_runs[0];
            if (last && last.conclusion === 'failure') {
              const { data: existing } = await github.rest.issues.listForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
                labels: ['build-failed'], state: 'open'
              });
              if (existing.length === 0) {
                await github.rest.issues.create({
                  owner: context.repo.owner, repo: context.repo.repo,
                  title: `Build failed: run #${last.run_number}`,
                  body: `فشل آخر Build.\nالتفاصيل: ${last.html_url}`,
                  labels: ['build-failed']
                });
              }
            }
