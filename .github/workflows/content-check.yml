name: Content Check
on:
  schedule: [{ cron: '0 8 * * *' }]
  workflow_dispatch:
jobs:
  check:
    permissions: { contents: read, issues: write }
    uses: md1god/MD-automation/.github/workflows/reusable-content-check.yml@2345badbc0e24b45bdc310e0bbc8d8aca3cb0331
    with:
      # ملاحظة: هذا مشروع React (Vite)، لذا لا توجد ملفات HTML منفصلة لكل صفحة في المصدر.
      # الفحص هنا يتحقق من ناتج البناء الفعلي (dist/) بعد npm run build، وليس من ملفات مصدر ثابتة.
      required-files: |
        dist/index.html
        dist/404.html
        dist/CNAME
        dist/robots.txt
        dist/sitemap.xml
      min-bytes: '400'
