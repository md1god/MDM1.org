name: 🚀 Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

# الصلاحيات دي مؤقتة وتلقائية بالكامل — مفيش أي token أو secret بتحطه إنت
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: ✅ Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Prepare Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # ينشر الريبو كله زي ما هو، بدون أي بناء أو تعديل

      - name: 🌐 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
