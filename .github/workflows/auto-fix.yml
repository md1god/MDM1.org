name: Auto Fix
on:
  issues: { types: [opened, labeled] }
  workflow_dispatch:
jobs:
  fix:
    if: contains(github.event.issue.labels.*.name, 'build-failed') || github.event_name == 'workflow_dispatch'
    permissions: { contents: write, issues: write }
    uses: md1god/MD-robot/.github/workflows/reusable-autofix.yml@main
    with: { build-command: npm run build }
