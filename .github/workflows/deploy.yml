name: Deploy
on:
  workflow_run:
    workflows: ["deploy"]
    types: [completed]
    branches: [main]
jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions: { contents: read, pages: write }
    uses: md1god/MD-robot/.github/workflows/reusable-deploy.yml@main
    with: { build-command: npm run deploy }
