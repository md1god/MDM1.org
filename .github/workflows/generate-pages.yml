name: 🔄 MD1$ Content Generator

on:
  schedule:
    - cron: '0 * * * *' # يعمل تلقائياً كل ساعة
  workflow_dispatch:     # زر تشغيل يدوي للاختبار

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: ✅ Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📝 Run Generator
        run: node build-pages.js

      - name: 🚀 Commit & Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "MD1 Bot"
          git add pages/
          git commit -m "🆕 تحديث محتوى جديد - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
