name: Reusable Auto Fix
on:
  workflow_call:
    inputs:
      node-version: { type: string, default: '20' }
      build-command: { type: string, default: 'npm run build' }
      base-branch: { type: string, default: 'main' }
  workflow_dispatch:
    inputs:
      node-version: { type: string, default: '20' }
      build-command: { type: string, default: 'npm run build' }
      base-branch: { type: string, default: 'main' }

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: '${{ inputs.base-branch }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ inputs.node-version }}' }
      - run: |
          rm -rf node_modules package-lock.json
          npm install
      - id: retry
        continue-on-error: true
        run: ${{ inputs.build-command }}
      - if: steps.retry.outcome == 'success'
        run: |
          git config user.name "auto-fix-bot"
          git config user.email "actions@github.com"
          git add package-lock.json
          git diff --cached --quiet || git commit -m "fix: regenerate lockfile [auto-fix]"
          git push
      - uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.retry.outcome }}' === 'success';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: success ? '✅ اتصلح تلقائي والبناء نجح.' : '❌ الإصلاح التلقائي مش كفى، محتاج مراجعة يدوية.'
            });
      - if: steps.retry.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: 'closed'
            });
