name: Reusable Publish
on:
  workflow_call:
    inputs:
      queue-dir: { type: string, default: 'content-queue/' }
    secrets:
      BOT_TOKEN: { required: true }
      CHAT_ID: { required: true }
  workflow_dispatch:
    inputs:
      queue-dir: { type: string, default: 'content-queue/', description: "المجلد الذي يحتوي على المحتوى" }

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - id: pick
        run: |
          file=$(ls "${{ inputs.queue-dir }}"/*.txt 2>/dev/null | sort | head -n 1 || true)
          if [ -z "$file" ]; then echo "found=false" >> "$GITHUB_OUTPUT"
          else echo "found=true" >> "$GITHUB_OUTPUT"; echo "file=$file" >> "$GITHUB_OUTPUT"; fi
      - if: steps.pick.outputs.found == 'true'
        run: |
          TEXT=$(cat "${{ steps.pick.outputs.file }}")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.CHAT_ID }}" --data-urlencode text="$TEXT"
      - if: steps.pick.outputs.found == 'true'
        run: |
          mkdir -p "${{ inputs.queue-dir }}/published"
          mv "${{ steps.pick.outputs.file }}" "${{ inputs.queue-dir }}/published/"
          git config user.name "auto-publish-bot"
          git config user.email "actions@github.com"
          git add -A && git commit -m "chore: published post [auto-publish]" && git push
