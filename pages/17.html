<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عن MD1usd - MDM1</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/pages.css">
  <style>
    /* حالة الصورة الفاضية (لسه ما اتضافتش) — نفس روح مربعات الجاليري الفاضية */
    .media-block { min-height: 220px; display: flex; align-items: center; justify-content: center; background: rgba(201,168,76,0.03); }
    .media-block .media-empty-icon { display: none; font-size: 2.5rem; opacity: 0.35; }
    .media-block.media-empty { flex-direction: column; gap: 1rem; }
    .media-block.media-empty .media-empty-icon { display: block; }
  </style>
</head>
<body>
  <div id="particles"></div>

  <nav class="navbar">
    <a href="https://mdm1.org/index.html" class="nav-logo">👁️ MDM1</a>
    <a href="https://mdm1.org/pages/index.html" class="nav-back">كل الصفحات</a>

  <header class="page-hero reveal">
    <div class="page-label">MDM1 · صفحة يومية</div>
    <h1 class="page-title">عن MD1usd</h1>
    <p class="page-sub">نظام حوكمة لامركزي يضع المجتمع في الصدارة</p>
  </header>

  <main class="page-content">
    <div class="media-block reveal" id="daily-media">
      <img src="../images/daily/17.jpeg" alt="رسالة اليوم"
           onerror="if(!this.dataset.triedPng){this.dataset.triedPng='1'; this.src='../images/daily/17.png';} else {this.style.display='none'; document.getElementById('daily-media').classList.add('media-empty');}">
      <div class="media-empty-icon">✦</div>
      <div class="media-caption">الشفافية ليست ضعفًا، بل أعلى درجات الثقة بالنفس.</div>

    ✦ MDM1 · صفحة #17 · الأحد، ١٩ يوليو ٢٠٢٦ ✦
  </footer>

  <script src="../js/global.js"></script>
</body>
</html>
