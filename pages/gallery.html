<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDM1 — المعرض</title>
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/pages.css">
<style>
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 1.2rem;
  margin: 2rem 0;
}
.gallery-item {
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  aspect-ratio: 1;
  cursor: pointer;
  border: 1px solid rgba(201,168,76,0.15);
  transition: border-color .3s, box-shadow .3s, transform .3s;
  background: rgba(201,168,76,0.04);
}
.gallery-item:hover {
  border-color: var(--gold);
  box-shadow: 0 0 30px rgba(201,168,76,0.2);
  transform: translateY(-4px);
}
.gallery-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform .4s;
  display: block;
}
.gallery-item:hover img { transform: scale(1.08); }
.gallery-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,.88), transparent);
  padding: 1rem;
  color: var(--gold);
  font-size: .88rem;
  letter-spacing: 1px;
  transform: translateY(100%);
  transition: transform .3s;
}
.gallery-item:hover .gallery-overlay { transform: translateY(0); }

/* filters */
.gallery-filters {
  display: flex;
  gap: .75rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 2rem;
  direction: rtl;
}
.filter-btn {
  padding: .5rem 1.3rem;
  background: transparent;
  border: 1px solid rgba(201,168,76,0.2);
  color: var(--light);
  border-radius: 20px;
  cursor: pointer;
  font-family: 'Tajawal', sans-serif;
  font-size: .9rem;
  transition: all .3s;
}
.filter-btn.is-active,
.filter-btn:hover {
  background: rgba(201,168,76,0.1);
  border-color: var(--gold);
  color: var(--gold);
}

/* lightbox */
.lb-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.96);
  z-index: 9000;
  justify-content: center;
  align-items: center;
  padding: 1.5rem;
}
.lb-overlay.is-open { display: flex; }
.lb-img {
  max-width: 90vw;
  max-height: 85vh;
  object-fit: contain;
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 8px;
}
.lb-close {
  position: absolute;
  top: 1.2rem; left: 1.2rem;
  background: none; border: none;
  color: var(--gold); font-size: 2rem;
  cursor: pointer; line-height: 1;
  transition: transform .2s;
}
.lb-close:hover { transform: scale(1.2); }
.lb-nav {
  position: absolute;
  top: 50%; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  padding: 0 1rem;
  transform: translateY(-50%);
  pointer-events: none;
}
.lb-nav button {
  background: rgba(201,168,76,0.15);
  color: var(--gold);
  border: 1px solid rgba(201,168,76,0.2);
  font-size: 1.6rem;
  padding: .4rem 1rem;
  border-radius: 8px;
  cursor: pointer;
  pointer-events: all;
  transition: background .3s;
}
.lb-nav button:hover { background: rgba(201,168,76,0.3); }
</style>
</head>
<body>

<div id="particles"></div>

<audio id="bg-music" src="../audio/gallery.mp3" loop preload="none"></audio>
<button id="music-btn" style="display:none">🔇</button>

<nav class="navbar">
  <a href="../index.html" class="nav-logo">🦅 MDM1</a>
  <a href="../index.html" class="nav-back">← العودة</a>
</nav>

<section class="page-hero">
  <span class="page-label">Gallery • المعرض</span>
  <h1 class="page-title">معرض الهوية البصرية</h1>
  <p class="page-sub">استكشف رحلة MDM1 من خلال الصور والفن البصري</p>
</section>

<div class="page-content">

  <div class="divider"></div>

  <div class="gallery-filters reveal">
    <button class="filter-btn is-active" data-cat="all">الكل</button>
    <button class="filter-btn" data-cat="coin">العملة</button>
    <button class="filter-btn" data-cat="culture">الثقافة</button>
    <button class="filter-btn" data-cat="technology">التكنولوجيا</button>
    <button class="filter-btn" data-cat="community">المجتمع</button>
  </div>

  <div class="gallery-grid reveal" id="gallery">
    <div class="gallery-item" data-cat="coin">
      <img src="../images/shared/coin-1.jpg" alt="عملة MDM1 الذهبية" loading="lazy">
      <div class="gallery-overlay">عملة MDM1 الذهبية</div>
    </div>
    <div class="gallery-item" data-cat="culture">
      <img src="../images/shared/pharaoh-1.jpg" alt="الرموز الفرعونية" loading="lazy">
      <div class="gallery-overlay">الرموز الفرعونية</div>
    </div>
    <div class="gallery-item" data-cat="technology">
      <img src="../images/shared/blockchain.jpg" alt="تقنية البلوكتشين" loading="lazy">
      <div class="gallery-overlay">تقنية البلوكتشين</div>
    </div>
    <div class="gallery-item" data-cat="community">
      <img src="../images/shared/community-1.jpg" alt="مجتمع MDM1" loading="lazy">
      <div class="gallery-overlay">مجتمع MDM1</div>
    </div>
    <div class="gallery-item" data-cat="culture">
      <img src="../images/shared/culture-1.jpg" alt="التراث الإسلامي" loading="lazy">
      <div class="gallery-overlay">التراث الإسلامي</div>
    </div>
    <div class="gallery-item" data-cat="technology">
      <img src="../images/shared/platform.jpg" alt="منصة MDM1" loading="lazy">
      <div class="gallery-overlay">منصة MDM1</div>
    </div>
    <div class="gallery-item" data-cat="coin">
      <img src="../images/shared/coin-2.jpg" alt="معاملات آمنة" loading="lazy">
      <div class="gallery-overlay">معاملات آمنة</div>
    </div>
    <div class="gallery-item" data-cat="community">
      <img src="../images/shared/community-2.jpg" alt="شبكة عالمية" loading="lazy">
      <div class="gallery-overlay">شبكة عالمية</div>
    </div>
  </div>

  <div class="divider"></div>
  <div class="reveal" style="text-align:center; margin-top:2rem;">
    <a href="join.html" class="cta-btn">✨ انضم إلى المشروع</a>
    <br><br>
    <a href="../hub.html" class="nav-back" style="display:inline-block; margin-top:0.5rem;">
      🏛️ المنصة ←
    </a>
  </div>

</div>

<!-- Lightbox -->
<div class="lb-overlay" id="lb">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <img class="lb-img" id="lb-img" src="" alt="">
  <div class="lb-nav">
    <button onclick="shiftLB(-1)">❮</button>
    <button onclick="shiftLB(1)">❯</button>
  </div>
</div>

<footer class="page-footer">
  ✦ &nbsp; MDM1 · صراع الأزل · Polygon Network &nbsp; ✦
</footer>

<script src="../js/global.js"></script>
<script src="../js/pages.js"></script>
<script>
let lbIdx = 0;
const visibleItems = () => [...document.querySelectorAll('.gallery-item:not([hidden])')];

document.querySelectorAll('.gallery-item').forEach(el => {
  el.addEventListener('click', () => {
    const list = visibleItems();
    lbIdx = list.indexOf(el);
    document.getElementById('lb-img').src = el.querySelector('img').src;
    document.getElementById('lb').classList.add('is-open');
    document.body.style.overflow = 'hidden';
  });
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('is-active'));
    btn.classList.add('is-active');
    const cat = btn.dataset.cat;
    document.querySelectorAll('.gallery-item').forEach(el => {
      el.hidden = cat !== 'all' && el.dataset.cat !== cat;
    });
  });
});

function closeLB() {
  document.getElementById('lb').classList.remove('is-open');
  document.body.style.overflow = '';
}
function shiftLB(dir) {
  const list = visibleItems();
  lbIdx = (lbIdx + dir + list.length) % list.length;
  document.getElementById('lb-img').src = list[lbIdx].querySelector('img').src;
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('is-open')) return;
  if (e.key === 'ArrowLeft')  shiftLB(-1);
  if (e.key === 'ArrowRight') shiftLB(1);
  if (e.key === 'Escape')     closeLB();
});
document.getElementById('lb').addEventListener('click', e => {
  if (e.target.id === 'lb') closeLB();
});
</script>
</body>
</html>
