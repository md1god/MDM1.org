<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDM1 — شارك فكرتك</title>
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/pages.css">
<style>
  .idea-card { border:1px solid rgba(201,168,76,0.15); border-radius:14px; background:rgba(201,168,76,0.03); padding:1.2rem 1.4rem; margin-bottom:1.2rem; }
  .idea-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:.6rem; gap:1rem; }
  .idea-guest { color:var(--gold-bright); font-weight:700; font-size:.9rem; flex-shrink:0; }
  .idea-time { color:rgba(232,213,163,0.4); font-size:.78rem; }
  .idea-content { font-size:.98rem; line-height:1.8; margin-bottom:.9rem; opacity:.92; }
  .idea-replies { display:flex; flex-direction:column; gap:.55rem; margin-bottom:.9rem; padding-right:1rem; border-right:2px solid rgba(201,168,76,0.15); }
  .reply-bubble { font-size:.88rem; opacity:.85; line-height:1.6; }
  .reply-guest { color:var(--gold); font-weight:700; }
  .idea-reply-box { display:flex; gap:.6rem; }
  .reply-input { flex:1; padding:.55rem .9rem; background:rgba(201,168,76,0.04); border:1px solid rgba(201,168,76,0.15); border-radius:8px; color:var(--light); font-family:'Tajawal',sans-serif; font-size:.9rem; direction:rtl; outline:none; }
  .reply-send { padding:.55rem 1.2rem; border:1px solid rgba(201,168,76,0.3); border-radius:8px; background:transparent; color:var(--gold-bright); cursor:pointer; font-family:'Tajawal',sans-serif; font-size:.85rem; }
  .reply-send:hover { background:rgba(201,168,76,0.1); }
  .reply-msg { font-size:.8rem; color:var(--blood-bright); min-height:1.1rem; margin-top:.3rem; }
</style>
</head>
<body>

<div id="particles"></div>

<audio id="bg-music" src="../audio/ideas.mp3" loop preload="none"></audio>
<button id="music-btn" style="display:none">🔇</button>

<nav class="navbar">
  <a href="../index.html" class="nav-logo">🦅 MDM1</a>
  <a href="../index.html" class="nav-back">← العودة</a>
</nav>

<section class="page-hero">
  <span class="page-label">Voice • صوتك</span>
  <h1 class="page-title">شارك فكرتك معنا</h1>
  <p class="page-sub">لوحة عامة مفتوحة — كل الآراء هنا مجهولة الهوية إلا إن كشفتها بنفسك</p>
</section>

<div class="page-content">

  <div class="divider"></div>

  <!-- بوابة تسجيل الدخول — تظهر فقط لمن ليس لديه جلسة نشطة -->
  <div id="auth-gate" style="display:none; max-width:480px; margin:0 auto;">
    <p style="text-align:center; margin-bottom:1.5rem; opacity:.8;">
      سجّل دخولك بالبريد الذي استخدمته في صفحة الانضمام لتشارك وترى اللوحة
    </p>
    <div style="display:flex; flex-direction:column; gap:1rem;">
      <input type="email" id="login-email" placeholder="بريدك الإلكتروني"
        style="padding:.85rem 1.2rem; background:rgba(201,168,76,0.04); border:1px solid rgba(201,168,76,0.2); border-radius:10px; color:var(--light); font-family:'Tajawal',sans-serif; font-size:1rem; direction:rtl; outline:none;">
      <button onclick="requestLogin()" class="cta-btn" style="width:100%;">إرسال رابط الدخول</button>
      <div id="login-msg" style="text-align:center; font-size:.9rem; min-height:1.3rem;"></div>
    </div>
    <p style="text-align:center; margin-top:1.5rem; font-size:.85rem; opacity:.6;">
      لم تسجّل بعد؟ <a href="join.html" style="color:var(--gold-bright);">انضم من هنا أولاً ←</a>
    </p>
  </div>

  <!-- اللوحة العامة — تظهر فقط لمن لديه جلسة مؤكدة -->
  <div id="board-area" style="display:none;">

    <div id="new-idea-box" style="max-width:600px; margin:0 auto 2.5rem;">
      <p id="my-guest-label" style="text-align:center; margin-bottom:1rem; font-size:.9rem; color:var(--gold);"></p>
      <textarea id="new-idea-input" rows="3" placeholder="شاركنا فكرتك أو رأيك..."
        style="width:100%; padding:.9rem 1.2rem; background:rgba(201,168,76,0.04); border:1px solid rgba(201,168,76,0.2); border-radius:10px; color:var(--light); font-family:'Tajawal',sans-serif; font-size:1rem; direction:rtl; outline:none; resize:vertical;"></textarea>
      <div style="display:flex; justify-content:flex-end; align-items:center; gap:1rem; margin-top:.75rem;">
        <div id="new-idea-msg" style="font-size:.85rem; color:var(--blood-bright);"></div>
        <button onclick="postIdea()" class="cta-btn" style="padding:.7rem 2rem;">نشر</button>
      </div>
    </div>

    <div id="ideas-feed" style="max-width:600px; margin:0 auto;"></div>

  </div>

</div>

<footer class="page-footer">
  ✦ &nbsp; MDM1 · صراع الأزل · Polygon Network &nbsp; ✦
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/community.js"></script>
<script src="../js/global.js"></script>
<script src="../js/pages.js"></script>
<script>
let currentUser = null;
const guestCache = {};

async function initIdeasPage() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) {
    document.getElementById('auth-gate').style.display = 'block';
    document.getElementById('board-area').style.display = 'none';
    return;
  }
  currentUser = session.user;
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('board-area').style.display = 'block';

  const myNum = await getGuestNumber(currentUser.id);
  document.getElementById('my-guest-label').textContent = 'تنشر هنا باسم: زائر رقم ' + myNum + ' — هويتك الحقيقية لا تظهر لأحد إلا إذا كتبتها بنفسك';

  await loadIdeas();
  subscribeRealtime();
}

async function requestLogin() {
  const email = document.getElementById('login-email').value.trim();
  const msg = document.getElementById('login-msg');
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    msg.style.color = 'var(--blood-bright)';
    msg.textContent = '⚠ أدخل بريد إلكتروني صحيح';
    return;
  }
  const { error } = await sendMagicLink(email);
  msg.style.color = error ? 'var(--blood-bright)' : 'var(--gold-bright)';
  msg.textContent = error ? '⚠ حدث خطأ، حاول لاحقاً' : '✓ تحقق من بريدك واضغط الرابط للدخول هنا';
}

async function getGuestNumber(id) {
  if (guestCache[id] !== undefined) return guestCache[id];
  const { data, error } = await supabase.from('profiles').select('guest_number').eq('id', id).single();
  if (error) { console.error(error); return '؟'; }
  guestCache[id] = data.guest_number;
  return data.guest_number;
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString('ar-EG', { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });
}

async function loadIdeas() {
  const { data: ideas, error } = await supabase
    .from('ideas')
    .select('*')
    .order('created_at', { ascending: false });
  if (error) { console.error(error); return; }

  const feed = document.getElementById('ideas-feed');
  feed.innerHTML = '';
  if (!ideas.length) {
    feed.innerHTML = '<p class="empty-msg" style="text-align:center; opacity:.5; padding:2rem 0;">لا توجد أفكار بعد — كن أول من يشارك</p>';
    return;
  }
  for (const idea of ideas) {
    await renderIdeaCard(idea, false);
    await loadRepliesForIdea(idea.id);
  }
}

async function renderIdeaCard(idea, atTop) {
  const feed = document.getElementById('ideas-feed');
  const empty = feed.querySelector('.empty-msg');
  if (empty) empty.remove();
  if (document.getElementById('idea-' + idea.id)) return; // تجنّب التكرار

  const guestNum = await getGuestNumber(idea.subscriber_id);

  const card = document.createElement('div');
  card.id = 'idea-' + idea.id;
  card.className = 'idea-card';
  card.innerHTML = `
    <div class="idea-head">
      <span class="idea-guest">زائر رقم ${guestNum}</span>
      <span class="idea-time">${formatTime(idea.created_at)}</span>
    </div>
    <p class="idea-content"></p>
    <div class="idea-replies" id="replies-${idea.id}"></div>
    <div class="idea-reply-box">
      <input type="text" class="reply-input" placeholder="اكتب رداً...">
      <button class="reply-send">رد</button>
    </div>
    <div class="reply-msg"></div>
  `;
  card.querySelector('.idea-content').textContent = idea.content;
  const replyInput = card.querySelector('.reply-input');
  card.querySelector('.reply-send').onclick = () => sendReply(idea.id, replyInput);
  replyInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); sendReply(idea.id, replyInput); }
  });

  if (atTop) feed.prepend(card); else feed.appendChild(card);
}

async function loadRepliesForIdea(ideaId) {
  const { data: replies, error } = await supabase
    .from('idea_replies')
    .select('*')
    .eq('idea_id', ideaId)
    .order('created_at', { ascending: true });
  if (error) { console.error(error); return; }
  for (const r of replies) await appendReplyBubble(r);
}

async function appendReplyBubble(r) {
  const box = document.getElementById('replies-' + r.idea_id);
  if (!box) return;
  if (document.getElementById('reply-' + r.id)) return; // تجنّب التكرار
  const guestNum = await getGuestNumber(r.subscriber_id);
  const bubble = document.createElement('div');
  bubble.id = 'reply-' + r.id;
  bubble.className = 'reply-bubble';
  bubble.innerHTML = `<span class="reply-guest">زائر رقم ${guestNum}:</span> `;
  bubble.append(document.createTextNode(r.content));
  box.appendChild(bubble);
}

async function postIdea() {
  const input = document.getElementById('new-idea-input');
  const msg = document.getElementById('new-idea-msg');
  const text = input.value.trim();
  if (!text) return;
  if (containsLink(text)) { msg.textContent = '⚠ لا يُسمح بإضافة روابط'; return; }
  msg.textContent = '';
  const { error } = await supabase.from('ideas').insert({ subscriber_id: currentUser.id, content: text });
  if (error) { msg.textContent = '⚠ تعذر النشر، حاول لاحقاً'; console.error(error); return; }
  input.value = '';
}

async function sendReply(ideaId, inputEl) {
  const card = inputEl.closest('.idea-card');
  const msgEl = card.querySelector('.reply-msg');
  const text = inputEl.value.trim();
  if (!text) return;
  if (containsLink(text)) { msgEl.textContent = '⚠ لا يُسمح بإضافة روابط'; return; }
  msgEl.textContent = '';
  const { error } = await supabase.from('idea_replies').insert({ idea_id: ideaId, subscriber_id: currentUser.id, content: text });
  if (error) { msgEl.textContent = '⚠ تعذر إرسال الرد'; console.error(error); return; }
  inputEl.value = '';
}

function subscribeRealtime() {
  supabase.channel('ideas-feed')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'ideas' }, async (payload) => {
      await renderIdeaCard(payload.new, true);
    })
    .subscribe();

  supabase.channel('replies-feed')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'idea_replies' }, (payload) => {
      appendReplyBubble(payload.new);
    })
    .subscribe();
}

initIdeasPage();
</script>
</body>
</html>
